<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Comprobante Yape</title>
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <link rel="icon" href="YAPE.GIF" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#650D89" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background-color: #650D89;
      color: #333;
    }

    .container {
      max-width: 400px;
      margin: auto;
      padding: 40px 15px 15px 15px;
      background-color: #650D89;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .logo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .cerrar {
      width: 36px;
      height: 36px;
      background-color: rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      color: white;
      font-size: 22px;
      font-weight: 300;
      text-align: center;
      line-height: 36px;
      cursor: pointer;
      font-family: Arial, sans-serif;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .card h2 {
      color: #601E82;
      font-size: 20px;
      font-weight: 700;
      margin-top: 0;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .monto {
      margin: 10px 0 5px 0;
      font-weight: bold;
      display: flex;
      align-items: baseline;
      gap: 5px;
      color: #352952;
    }

    .simbolo {
      font-size: 28px;
      font-weight: 600;
    }

    #monto {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: -1.5px;
    }

    .nombre {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 15px;
      color: #352952;
      text-transform: uppercase;
    }

    .datos {
      font-size: 14px;
      color: #6D6D7C;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 15px;
      font-weight: 500;
    }

    .datos i {
      color: #6D6D7C;
      font-size: 15px;
    }

    .separator {
      color: #d0d0d0;
      font-weight: 300;
    }

    .share {
      color: #00D8A1;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .seguridad-box {
      margin: 20px 0 15px 0;
      border-top: 1px solid #f0f0f0;
      border-bottom: 1px solid #f0f0f0;
      padding: 16px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .seguridad-header {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .label-seguridad {
      font-size: 12px;
      color: #7F7F8F;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .codigo {
      display: flex;
      gap: 6px;
    }

    .caja {
      background-color: #EFEFEF;
      width: 26px;
      height: 28px;
      border-radius: 4px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 700;
      color: #444;
      font-size: 15px;
    }

    .transaccion-title {
      font-size: 12px;
      color: #7F7F8F;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin: 22px 0 12px 0;
    }

    .info {
      font-size: 15px;
      color: #352952;
    }

    .info p {
      margin: 10px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .info p .label {
      color: #555;
    }

    .info p span:not(.label) {
      font-weight: 600;
    }

    .promo-container {
      background-color: rgba(0, 0, 0, 0.18);
      border-radius: 12px;
      padding: 15px;
      margin-top: 20px;
    }

    .mas-en-yape {
      color: white;
      font-weight: 700;
      font-size: 16px;
      margin-top: 0;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nuevo-badge {
      background-color: #FFC800;
      color: #111;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
    }

    .footer-img {
      width: 100%;
      border-radius: 10px;
      display: block;
    }
  </style>
</head>

<body>

  <div class="container" id="comprobante">

    <div class="logo">
      <img src="YAPE.GIF" style="height:55px; width:55px; border-radius:50%; object-fit: cover;">
      <div class="cerrar" onclick="window.history.back()">×</div>
    </div>

    <div class="card">

      <h2>
        ¡Yapeaste!
        <span class="share" onclick="compartir()">
          <i class="fa-solid fa-share-nodes"></i> Compartir
        </span>
      </h2>

      <div class="monto">
        <span class="simbolo">S/</span>
        <span id="monto">0</span>
      </div>

      <div class="nombre" id="nombre">Nombre</div>

      <div class="datos">
        <span id="fecha"><i class="far fa-calendar-alt"></i> <span></span></span>
        <span class="separator">|</span>
        <span id="hora"><i class="far fa-clock"></i> <span></span></span>
      </div>

      <div class="seguridad-box">
        <div class="seguridad-header">
          <span class="label-seguridad">CÓDIGO DE SEGURIDAD</span>
          <i class="fa-solid fa-circle-info" style="color: #00D8A1; font-size: 18px; margin-left: 2px;"></i>
        </div>

        <div class="codigo" id="codigo-seguridad">
          <div class="caja">-</div>
          <div class="caja">-</div>
          <div class="caja">-</div>
        </div>
      </div>

      <div class="transaccion-title">
        DATOS DE LA TRANSACCIÓN
      </div>

      <div class="info">
        <p><span class="label">Nro. de celular</span> <span id="telefono">*********</span></p>
        <p><span class="label">Destino</span> <span>Yape</span></p>
        <p><span class="label">Nro. de operación</span> <span id="operacion">---</span></p>
      </div>

    </div>

    <div class="promo-container">
      <div class="mas-en-yape">
        Más en Yape <span class="nuevo-badge">Nuevo</span>
      </div>
      <img class="footer-img" id="promo-img" src="IMAGEN.webp">
    </div>

  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }

    // parámetros
    const params = new URLSearchParams(window.location.search)
    const nombre = decodeURIComponent(params.get("nombre") || "Sin nombre")
    const telefono = decodeURIComponent(params.get("telefono") || "000000000")
    const monto = decodeURIComponent(params.get("monto") || "0")

    function formatName(name) {
      if (name === "Sin nombre") return name.toUpperCase();
      return name.trim().toUpperCase();
    }

    document.getElementById("nombre").textContent = formatName(nombre)

    const montoNum = parseFloat(monto)

    document.getElementById("monto").textContent =
      montoNum % 1 === 0 ? montoNum : montoNum.toFixed(2)

    document.getElementById("telefono").textContent =
      `*** ***${telefono.slice(-3)}`

    // fecha hora
    const fechaObj = new Date()

    const mesStr = fechaObj.toLocaleString('es-PE', { month: 'short' }).replace('.', '').toLowerCase();
    document.querySelector("#fecha span").textContent =
      `${fechaObj.getDate().toString().padStart(2, '0')} ${mesStr}. ${fechaObj.getFullYear()}`;

    let horaStr = fechaObj.toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit', hour12: true }).toLowerCase();
    horaStr = horaStr.replace('p.m.', 'p. m.').replace('a.m.', 'a. m.');
    // En caso venga con espacio pegado
    horaStr = horaStr.replace('p. m.', 'p. m.').replace('a. m.', 'a. m.'); 
    document.querySelector("#hora span").textContent = horaStr;

    // código seguridad
    const codigo = Math.floor(Math.random() * 900 + 100).toString()

    const cajas = document.getElementById("codigo-seguridad").children

    for (let i = 0; i < 3; i++) {
      cajas[i].textContent = codigo[i]
    }

    // confeti
    function lanzarConfeti() {

      confetti({
        particleCount: 150,
        spread: 70,
        origin: { y: 0.6 }
      })

      setTimeout(() => {
        confetti({ particleCount: 100, angle: 60, spread: 55, origin: { x: 0 } })
        confetti({ particleCount: 100, angle: 120, spread: 55, origin: { x: 1 } })
      }, 300)

    }

    lanzarConfeti()

    // operación
    document.getElementById("operacion").textContent =
      Math.floor(10000000 + Math.random() * 90000000)

    // promociones
    const promociones = [
      "IMAGEN.webp"
    ]

    document.getElementById("promo-img").src =
      promociones[0]

    // compartir
    async function compartir() {

      const comprobante = document.getElementById("comprobante")

      try {

        const canvas = await html2canvas(comprobante, {
          scale: 2,
          useCORS: true
        })

        const blob = await new Promise(resolve =>
          canvas.toBlob(resolve, "image/png")
        )

        const file = new File([blob], "comprobante.png", { type: "image/png" })

        if (navigator.canShare && navigator.canShare({ files: [file] })) {

          await navigator.share({
            title: "Comprobante Yape",
            text: "Te comparto el comprobante.",
            files: [file]
          })

        } else {

          const link = document.createElement("a")
          link.href = canvas.toDataURL("image/png")
          link.download = "comprobante.png"
          link.click()

        }

      } catch (error) {

        alert("Error al generar imagen")

      }

    }

  </script>

</body>

</html>
