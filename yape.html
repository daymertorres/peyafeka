<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Comprobante Yape</title>
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <link rel="icon" href="YAPE.GIF" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#650D89" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background-color: #650D89;
      color: #333;
    }

    .container {
      max-width: 400px;
      margin: auto;
      padding: 90px 15px 15px 15px;
      background-color: #650D89;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .logo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .cerrar {
      width: 36px;
      height: 36px;
      background-color: rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      color: white;
      font-size: 22px;
      font-weight: 300;
      text-align: center;
      line-height: 36px;
      cursor: pointer;
      font-family: Arial, sans-serif;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      margin-top: 12px;
    }

    .card h2 {
      color: #863C95;
      font-size: 20px;
      font-weight: 700;
      margin: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .share {
      color: #10cbb4;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
    }

    .monto-box {
      margin-top: 12px;
    }

    .monto {
      display: flex;
      align-items: baseline;
      color: #000;
      margin: 0;
    }

    .simbolo {
      font-size: 30px;
      font-weight: 700;
      margin-right: 4px;
    }

    #montoFinal {
      font-size: 48px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -1px;
    }

    .nombre {
      font-size: 20px;
      font-weight: 700;
      color: #000;
      margin: 8px 0;
      text-transform: uppercase;
    }

    .datos {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      color: #6b7280;
      font-weight: 600;
      margin-top: 4px;
      margin-bottom: 8px;
    }

    .datos svg {
      width: 14px;
      height: 14px;
    }

    .separator {
      margin: 0 4px;
      color: #d1d5db;
      font-weight: 300;
    }

    .divider {
      border: 0;
      border-top: 1px solid #e5e7eb;
      margin: 8px 0;
    }

    .seguridad-box {
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .seguridad-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .label-seguridad {
      color: #7b7388;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin: 0;
    }

    .codigo {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .caja {
      background-color: #e5e7eb;
      color: #374151;
      font-weight: 700;
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 4px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .transaccion-title {
      color: #7b7388;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin: 0 0 12px 0;
    }

    .info {
      font-size: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 8px;
    }

    .info p {
      margin: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .info p .label {
      color: #555;
    }

    .info p span:not(.label) {
      color: #222;
      font-weight: 600;
    }

    .promo-container {
      background-color: rgba(0, 0, 0, 0.18);
      border-radius: 12px;
      padding: 15px;
      margin-top: 20px;
    }

    .mas-en-yape {
      color: white;
      font-weight: 700;
      font-size: 16px;
      margin-top: 0;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nuevo-badge {
      background-color: #FFC800;
      color: #111;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
    }

    .footer-img {
      width: 100%;
      border-radius: 10px;
      display: block;
    }
  </style>
</head>

<body>

  <div class="container" id="comprobante">

    <div class="logo">
      <img src="YAPE.GIF" style="height:55px; width:55px; border-radius:50%; object-fit: cover;">
      <div class="cerrar" onclick="window.history.back()">×</div>
    </div>

    <div class="card">
      <h2>
        ¡Yapeaste!
        <span class="share" onclick="compartir()"><i class="fa-solid fa-share-nodes"></i>COMPARTIR</span>
      </h2>
      <div class="monto-box">
        <div class="monto"><span class="simbolo">S/</span><span id="montoFinal">100</span></div>
        <div class="nombre" id="nombreDestino">PEDRO CASTILLO</div>
        <div class="datos">
          <svg xmlns="http://www.w3.org/2000/svg" width="0.88rem" height="0.88rem" viewBox="0 0 18.45 18.45"><g transform="translate(9 9)"><use href="#cal-shape0" transform="translate(-9 -9)"></use></g><defs><g id="cal-shape0" transform="translate(9 9)"><path d="M-5.2 -5.05 Q-7.2 -5.05 -7.2 -3.05 L-7.2 -1.8 7.25 -1.8 7.25 -3.05 Q7.25 -5.05 5.25 -5.05 L-5.2 -5.05
                M7.25 5.25 L7.25 0.2 -7.2 0.2 -7.2 5.25 Q-7.2 7.25 -5.2 7.25 L5.25 7.25 Q7.25 7.25 7.25 5.25
                M5.25 -7.05 Q9.25 -7.05 9.25 -3.05 L9.25 5.25 Q9.25 9.25 5.25 9.25 L-5.2 9.25 Q-9 9.25 -9 5.25
                L-9 -3.05 Q-9 -7.05 -5.2 -7.05 L-4.75 -7.05 -4.75 -8.2 -4.45 -8.85 -4.4 -8.9 -3.75 -9
                Q-3.35 -9 -3.0 -8.85 -2.75 -8.6 -2.75 -8.2 L-2.75 -7.05 3.2 -7.05 3.2 -8.2
                Q3.2 -8.6 3.5 -8.85 L3.55 -8.9 Q3.8 -9 4.2 -9 4.6 -9 4.95 -8.85
                L5.2 -8.2 5.2 -7.05 5.25 -7.05" fill="#67617b"></path></g></defs></svg>
          <span id="fechaActual">14 jun. 2026</span><span class="separator">|</span>
          <svg xmlns="http://www.w3.org/2000/svg" height="0.95rem" width="0.95rem" viewBox="0 0 20.4 20.4"><g transform="matrix(1, 0, 0, 1, 10.2, 10.2)"><use href="#clock-shape0" transform="matrix(1, 0, 0, 1, -10.2, -10.2)"></use></g><defs><g id="clock-shape0" transform="matrix(1, 0, 0, 1, 10.2, 10.2)"><path d="M6.0 5.65 L5.95 5.7 6.0 5.65 M0.0 2.0 L-0.65 1.75 -1.0 1.0 -1.0 -4.5 -0.7 -5.15 -0.65 -5.2 Q-0.4 -5.5 0.0 -5.5 L0.75 -5.15 1.0 -4.5 1.0 0.0 2.95 0.0 Q3.35 0.0 3.7 0.35 L3.95 1.0 3.7 1.7 3.65 1.75 2.95 2.0 0.0 2.0 M8.2 -0.05 Q8.2 -3.45 5.85 -5.75 3.45 -8.2 0.05 -8.2 -3.4 -8.2 -5.75 -5.75 -8.2 -3.45 -8.2 -0.05 -8.2 3.4 -5.75 5.75 L-5.7 5.8 -5.7 5.85 Q-3.35 8.2 0.05 8.2 3.45 8.2 5.8 5.8 L5.85 5.75 Q8.2 3.4 8.2 -0.05 M7.25 7.2 Q4.9 9.55 1.85 10.05 L0.05 10.2 -1.75 10.05 Q-4.85 9.55 -7.15 7.2 -10.2 4.3 -10.2 -0.05 -10.2 -4.25 -7.15 -7.15 -4.2 -10.2 0.05 -10.2 4.25 -10.2 7.25 -7.15 10.2 -4.25 10.2 -0.05 10.2 4.25 7.25 7.2" fill="#67617B" fill-rule="evenodd" stroke="none"></path></g></defs></svg>
          <span id="horaActual">09:16 p. m.</span>
        </div>
        <hr class="divider">
      </div>
      <div class="seguridad-box">
        <div class="seguridad-header">
          <span class="label-seguridad">CÓDIGO DE SEGURIDAD</span>
          <svg width="16" height="16" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="32" fill="#06C7B1"></circle><circle cx="32" cy="18" r="3" fill="#FFFFFF"></circle><rect x="29" y="24" width="6" height="22" rx="3" fill="#FFFFFF"></rect></svg>
        </div>
        <div class="codigo" id="codigoSeguridad">
          <div class="caja">5</div>
          <div class="caja">2</div>
          <div class="caja">3</div>
        </div>
      </div>
      <hr class="divider">
      <div class="transaccion-title">DATOS DE LA TRANSACCIÓN</div>
      <div class="info">
        <p><span class="label">Nro. de celular</span> <span id="numeroDestino">*** *** das</span></p>
        <p><span class="label">Destino</span> <span>Yape</span></p>
        <p><span class="label">Nro. de operación</span> <span id="numeroOperacion">69032523</span></p>
      </div>
    </div>

    <div class="promo-container">
      <div class="mas-en-yape">
        Más en Yape <span class="nuevo-badge">Nuevo</span>
      </div>
      <img class="footer-img" id="promo-img" src="IMAGEN.webp">
    </div>

  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }

    // parámetros
    const params = new URLSearchParams(window.location.search)
    const nombre = decodeURIComponent(params.get("nombre") || "Sin nombre")
    const telefono = decodeURIComponent(params.get("telefono") || "000000000")
    const monto = decodeURIComponent(params.get("monto") || "0")

    function formatName(name) {
      if (name === "Sin nombre") return name.toUpperCase();
      return name.trim().toUpperCase();
    }

    document.getElementById("nombreDestino").textContent = formatName(nombre)

    const montoNum = parseFloat(monto)

    document.getElementById("montoFinal").textContent =
      montoNum % 1 === 0 ? montoNum : montoNum.toFixed(2)

    document.getElementById("numeroDestino").textContent =
      `*** *** ${telefono.slice(-3)}`

    // fecha hora
    const fechaObj = new Date()

    const mesStr = fechaObj.toLocaleString('es-PE', { month: 'short' }).replace('.', '').toLowerCase();
    document.getElementById("fechaActual").textContent =
      `${fechaObj.getDate().toString().padStart(2, '0')} ${mesStr}. ${fechaObj.getFullYear()}`;

    let horaStr = fechaObj.toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit', hour12: true }).toLowerCase();
    horaStr = horaStr.replace('p.m.', 'p. m.').replace('a.m.', 'a. m.');
    // En caso venga con espacio pegado
    horaStr = horaStr.replace('p. m.', 'p. m.').replace('a. m.', 'a. m.'); 
    document.getElementById("horaActual").textContent = horaStr;

    // código seguridad
    const codigo = Math.floor(Math.random() * 900 + 100).toString()

    const cajas = document.getElementById("codigoSeguridad").children

    for (let i = 0; i < 3; i++) {
      cajas[i].textContent = codigo[i]
    }

    // confeti
    function lanzarConfeti() {

      confetti({
        particleCount: 150,
        spread: 70,
        origin: { y: 0.6 }
      })

      setTimeout(() => {
        confetti({ particleCount: 100, angle: 60, spread: 55, origin: { x: 0 } })
        confetti({ particleCount: 100, angle: 120, spread: 55, origin: { x: 1 } })
      }, 300)

    }

    lanzarConfeti()

    // operación
    document.getElementById("numeroOperacion").textContent =
      Math.floor(10000000 + Math.random() * 90000000)

    // promociones
    const promociones = [
      "IMAGEN.webp"
    ]

    document.getElementById("promo-img").src =
      promociones[0]

    // compartir
    async function compartir() {

      const comprobante = document.getElementById("comprobante")

      try {

        const canvas = await html2canvas(comprobante, {
          scale: 2,
          useCORS: true
        })

        const blob = await new Promise(resolve =>
          canvas.toBlob(resolve, "image/png")
        )

        const file = new File([blob], "comprobante.png", { type: "image/png" })

        if (navigator.canShare && navigator.canShare({ files: [file] })) {

          await navigator.share({
            title: "Comprobante Yape",
            text: "Te comparto el comprobante.",
            files: [file]
          })

        } else {

          const link = document.createElement("a")
          link.href = canvas.toDataURL("image/png")
          link.download = "comprobante.png"
          link.click()

        }

      } catch (error) {

        alert("Error al generar imagen")

      }

    }

  </script>

</body>

</html>
